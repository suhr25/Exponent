services:
  - type: web
    name: stockfolio
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      # Supabase — paste values from supabase.com > Project Settings > API
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      # Groww Trading API
      - key: GROWW_API_KEY
        sync: false
      - key: GROWW_API_SECRET
        sync: false
      # MongoDB Atlas — mongodb+srv://user:pass@cluster.mongodb.net
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: stockfolio
      # Anthropic (optional — falls back to mock if not set)
      - key: ANTHROPIC_API_KEY
        sync: false
